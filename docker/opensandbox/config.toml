[server]
host = "0.0.0.0"
port = 8090

[log]
level = "INFO"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.12"

[egress]
image = "opensandbox/egress:v1.0.8"

[docker]
network_mode = "bridge"
# Override this if Docker bridge containers cannot resolve the host from your environment.
# `host.docker.internal` works well on Docker Desktop and common WSL2 setups.
host_ip = "host.docker.internal"
drop_capabilities = [
  "AUDIT_WRITE",
  "MKNOD",
  "NET_ADMIN",
  "NET_RAW",
  "SYS_ADMIN",
  "SYS_MODULE",
  "SYS_PTRACE",
  "SYS_TIME",
  "SYS_TTY_CONFIG",
]
no_new_privileges = true
pids_limit = 4096

[ingress]
mode = "direct"
