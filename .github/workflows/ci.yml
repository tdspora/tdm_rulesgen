name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra api --extra dev --locked

      - name: Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Pip audit
        continue-on-error: true
        run: >-
          uv run pip-audit
          --skip-editable

  release:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic-release.outputs.released }}
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Require baseline semver tag
        run: |
          if [ -n "$(git tag -l 'v*')" ]; then
            exit 0
          fi
          ver=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "::error::Add a git tag matching project.version (${ver}) before the first release, e.g.: git tag v${ver} && git push origin v${ver}"
          exit 1

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Ensure git origin uses SSH
        run: |
          echo "origin before:"
          git remote -v

          # actions/checkout with ssh-key should already set origin to SSH, but
          # some tooling will re-write it to HTTPS. Force SSH to ensure pushes
          # are attributed to the deploy key actor for ruleset bypass.
          git remote set-url origin "git@github.com:${{ github.repository }}.git"

          echo "origin after:"
          git remote -v

      - name: Semantic release
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@v10.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update uv.lock after release bump
        if: steps.semantic-release.outputs.released == 'true'
        run: |
          uv lock

          if git diff --quiet -- uv.lock; then
            echo "uv.lock unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add uv.lock
          git commit -m "chore: update uv.lock [skip ci]"
          git push

      - name: Upload distribution artifacts
        if: steps.semantic-release.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

      - name: Upload release assets
        if: steps.semantic-release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.semantic-release.outputs.tag }}

  publish-pypi:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: distribution-artifacts
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          print-hash: true
          verbose: true
