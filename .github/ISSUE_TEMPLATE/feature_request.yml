name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are solving so maintainers can weigh trade-offs with you.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What is hard, missing, or inconsistent today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Sketch the behavior, API shape, or documentation you have in mind.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you prefer this one.
      render: markdown
