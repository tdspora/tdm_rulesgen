services:
  rulesgen:
    depends_on:
      - opensandbox-server
    environment:
      RULESGEN_SANDBOX_BACKEND: opensandbox
      RULESGEN_OPENSANDBOX_DOMAIN: opensandbox-server:8090
      RULESGEN_OPENSANDBOX_PROTOCOL: http
      RULESGEN_OPENSANDBOX_USE_SERVER_PROXY: "false"
      RULESGEN_OPENSANDBOX_IMAGE: rulesgen:local
      RULESGEN_OPENSANDBOX_TTL_SECONDS: "600"
      RULESGEN_OPENSANDBOX_READY_TIMEOUT_SECONDS: "30"
      RULESGEN_OPENSANDBOX_WORKSPACE_DIR: /tmp/rulesgen-opensandbox
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
      RULESGEN_LLM_GATEWAY_BACKEND: ${RULESGEN_LLM_GATEWAY_BACKEND:-litellm}
      RULESGEN_LLM_GATEWAY_TIMEOUT_SECONDS: 10
      RULESGEN_LLM_PROMPT_TEMPLATE_VERSION: v1
      RULESGEN_LLM_MODEL_NAME: gpt-4
      RULESGEN_LLM_TEMPERATURE: 0
      RULESGEN_LLM_FEEDBACK_MAX_ATTEMPTS: 2
      RULESGEN_LLM_SEMANTIC_CACHE_ENABLED: true
      RULESGEN_LLM_SEMANTIC_CACHE_DIR: /home/appuser/.rulesgen-data/semantic-cache
      RULESGEN_LLM_SEMANTIC_CACHE_SIMILARITY_THRESHOLD: 0.99
      RULESGEN_LLM_SEMANTIC_CACHE_EMBEDDING_DIMENSION: 256

  opensandbox-server:
    image: opensandbox/server:latest
    ports:
      - "8090:8090"
    environment:
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/opensandbox/config.toml:/etc/opensandbox/config.toml:ro
