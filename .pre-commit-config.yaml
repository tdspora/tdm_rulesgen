repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        types: [python]
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]
